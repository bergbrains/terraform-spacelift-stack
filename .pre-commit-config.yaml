exclude: '^.*\.(iml|pub|terraform)'
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0  # https://github.com/pre-commit/pre-commit-hooks
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-docstring-first
      - id: detect-aws-credentials
      - id: check-shebang-scripts-are-executable
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [ --markdown-linebreak-ext=md ]
      # Cross platform
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [ --fix=lf ]
      # Security
      - id: detect-aws-credentials
        args: [ '--allow-missing-credentials' ]
      - id: detect-private-key
  - repo: https://github.com/tofuutils/pre-commit-opentofu
    rev: v2.2.2 # Get the latest from: https://github.com/tofuutils/pre-commit-opentofu/releases
    hooks:
#      - id: tofu_validate
      - id: tofu_tflint
        args:
          - --args=--chdir=.
          - --args=--enable-rule=terraform_documented_variables
      - id: tofu_fmt
        name: Tofu Format
        args:
          - --args=-diff
          - --args=-no-color
      - id: tofu_docs
        name: Tofu Docs
        verbose: true
        args:
          - --hook-config=--path-to-file=README.md        # Valid UNIX path. I.e. ../TFDOC.md or docs/README.md etc.
          - --hook-config=--add-to-existing-file=true     # Boolean. true or false
          - --hook-config=--create-file-if-not-exist=true # Boolean. true or false
          - --hook-config=--use-standard-markers=true
      - id: tofu_docs
        name: Example Tofu Vars File
        args:
          - tfvars hcl --output-file terraform.tfvars.model .
      - id: tofu_providers_lock
        args:
          - --args=-platform=linux_amd64
          - --args=-platform=darwin_amd64
      - id: tofu_checkov
        args:
          - --args=--quiet
          - --args=--skip-check CKV2_AWS_8,CKV_AWS_61

  - repo: https://github.com/Lucas-C/pre-commit-hooks-nodejs
    rev: v1.1.2  # https://github.com/Lucas-C/pre-commit-hooks-nodejs
    hooks:
      - id: dockerfile_lint

